<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#7B2D8E"/>
    </linearGradient>
    <linearGradient id="book" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8D5F0"/>
      <stop offset="100%" stop-color="#C39BD3"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <!-- Notebook -->
  <g transform="translate(256,260)">
    <!-- Book shadow -->
    <rect x="-82" y="-100" width="164" height="192" rx="8" fill="rgba(0,0,0,0.1)" transform="translate(4,4)"/>
    <!-- Book cover -->
    <rect x="-82" y="-100" width="164" height="192" rx="8" fill="url(#book)" stroke="#9B59B6" stroke-width="2"/>
    <!-- Spine -->
    <rect x="-82" y="-100" width="14" height="192" rx="4" fill="#9B59B6"/>
    <!-- Page lines (right side) -->
    <line x1="-55" y1="-70" x2="70" y2="-70" stroke="#D4B5DE" stroke-width="2" stroke-linecap="round"/>
    <line x1="-55" y1="-50" x2="60" y2="-50" stroke="#D4B5DE" stroke-width="2" stroke-linecap="round"/>
    <line x1="-55" y1="-30" x2="65" y2="-30" stroke="#D4B5DE" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Baby face on the cover -->
  <g transform="translate(256,240)">
    <!-- Head -->
    <circle cx="0" cy="-10" r="38" fill="#FDEBD0" stroke="#E8B4B4" stroke-width="2"/>
    <!-- Hair -->
    <path d="M-30,-30 Q0,-55 30,-30" fill="none" stroke="#5D4037" stroke-width="4" stroke-linecap="round"/>
    <path d="M-25,-35 Q-10,-50 0,-48" fill="none" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
    <path d="M25,-35 Q10,-50 0,-48" fill="none" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
    <!-- Eyes -->
    <ellipse cx="-13" cy="-15" rx="5" ry="6" fill="#2D1B36"/>
    <ellipse cx="13" cy="-15" rx="5" ry="6" fill="#2D1B36"/>
    <ellipse cx="-11" cy="-17" rx="2" ry="2.5" fill="white"/>
    <ellipse cx="15" cy="-17" rx="2" ry="2.5" fill="white"/>
    <!-- Cheeks -->
    <ellipse cx="-24" cy="-2" rx="8" ry="5" fill="#F5B7B1" opacity="0.6"/>
    <ellipse cx="24" cy="-2" rx="8" ry="5" fill="#F5B7B1" opacity="0.6"/>
    <!-- Smile -->
    <path d="M-10,6 Q0,16 10,6" fill="none" stroke="#E74C3C" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Onesie body -->
    <rect x="-22" y="24" width="44" height="20" rx="6" fill="#F8F4FC" stroke="#C39BD3" stroke-width="1.5"/>
    <!-- Heart on onesie -->
    <path d="M-4,30 Q-4,26 0,26 Q4,26 4,30 Q4,34 0,37 Q-4,34 -4,30Z" fill="#E74C3C" opacity="0.8"/>
  </g>

  <!-- Sparkles -->
  <g fill="#FFFFFF" opacity="0.4">
    <circle cx="120" cy="100" r="4"/>
    <circle cx="400" cy="120" r="3"/>
    <circle cx="380" cy="400" r="5"/>
    <circle cx="100" cy="380" r="3"/>
  </g>
</svg>
